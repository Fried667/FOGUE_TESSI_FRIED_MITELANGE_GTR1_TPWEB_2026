<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <TITLE>Contact-Mon mini-site</TITLE>
        <LINK rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1>Page de contact </h1>
        <nav>
            <a href="index.html">Acceuil</a>
            <a href="presentation.html">Présentation</a>
            <a href="Contact.html">Contact</a>
        </nav>
        <h2>Formulaire de contact</h2>
        <p>Veullez remplir ce formulaire pour envoyer un message.</p>
        <form>
            <label for="nom" >Nom:</label>
            <input type="text" id="nom" name="nom" placeholder="Entrer votre nom" required>
            <br>
            <br>
            <label for="prenom">Prénom:</label>
            <input type="text" id="prenom" name="prenom" placeholder="Entrer votre prenom" required>
            <br>
            <br>
            <label for="email">Adresse email:</label>
            <input type="email" id="email" name="email"placeholder="exemple@email.com" required  >
            <br>
            <br>
            <label for="telephone">Télephone:</label>
            <input type="tel" id="telephone" name="telephone" placeholder="+237 xx xx xx xx" ></input>
            <br>
            <br>
            <label for="domaine">Domaine d'interêt:</label>
            <select id="domaine" name="domaine" required>
            <option value=""></option>
                <option value="reseaux">réseaux informatique</option>
                <option value="cybersecurite">Cybersecurité</option>
                <option value="developpement-web">Developpement-web</option>
               <option value="autre"> Administration système</option>
               </select>
               <br>
               <br>

            <label for="motif">Motif du message:</label>
            <select id="motif" name="motif" required>
                <option value=""></option>
                <option value="information">Demande d'information</option>
                <option value="stage">Demande de stage</option>
                <option value="projet">Proposition de projet</option>
               <option value="autre"> Autre demande</option> 
            </select>
            <br>
            <br>
            <p>Statut du visiteur:</p>
            <input type="radio" id="etudiant" name="statut" value="etudiant" required></input>
            <label for="etudiant">Etudiant</label>
            <br>
            <input type="radio" id="enseignement" name="statut" value="enseignement">
            <label for="enseignement">Enseignement</label>
            <br>
            <input type="radio" id="professionnel" name="statut" value=" professionnel">
            <label for="professionnel">Professionnel</label>
            <br>
            <br>

            <label for="message">Message</label>
            <br>
            <textarea id="message" name="message" rows="5" cols="40" placeholder="Ecrivez votre message" required></textarea>
            <br>
            <br>
            <input type="checkbox" id="confirmation" name="confirmation" required>
            <label for="confirmation">Je confirme que les informations saisies sont correctes.</label>
            <br>
            <br>
            <button type="submit">Envoyer</button>

        </form>
        </body>
        </html>
